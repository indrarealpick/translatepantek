<!DOCTYPE html>
<html lang="id" data-theme="light">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
<title>LinguaAI</title>
<meta name="description" content="AI Translator — Google Gemini & OpenRouter. Terjemahan natural, OCR gambar, kamera."/>

<!-- Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>

<!-- CSS -->
<link rel="stylesheet" href="style.css"/>

<!-- Tesseract OCR -->
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
</head>
<body>

<!-- ===================== HEADER ===================== -->
<header class="header">
  <div class="header-top">
    <div class="logo">
      <div class="logo-ico">🌐</div>
      LinguaAI
    </div>
    <div class="hdr-btns">
      <button class="hdr-btn" id="cfgBtn" title="Pengaturan">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.07 4.93A10 10 0 0 0 4.93 19.07M12 2v2M12 20v2M2 12h2M20 12h2"/>
        </svg>
      </button>
      <button class="hdr-btn" id="themeBtn" title="Tema">
        <svg id="moonIco" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
        <svg id="sunIco" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="hidden">
          <circle cx="12" cy="12" r="5"/>
          <line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
          <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
        </svg>
      </button>
    </div>
  </div>
  <div class="seg-tabs">
    <button class="seg-tab active" id="tabTr" onclick="switchTab('tr')">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/>
        <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
      </svg>
      Terjemahan
    </button>
    <button class="seg-tab" id="tabOcr" onclick="switchTab('ocr')">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
        <circle cx="12" cy="13" r="4"/>
      </svg>
      Kamera &amp; OCR
    </button>
  </div>
</header>

<!-- ===================== MAIN ===================== -->
<main class="main">

  <!-- API Key Banner -->
  <div class="banner hidden" id="banner">
    <div class="banner-txt">
      Belum ada API key — gratis pakai
      <a href="https://aistudio.google.com" target="_blank">Google AI Studio</a>
    </div>
    <button class="banner-btn" id="bannerBtn">Set</button>
  </div>

  <!-- ===== TAB: TERJEMAHAN ===== -->
  <div id="pageTr">
    <div class="card">

      <!-- Language Picker -->
      <div class="lang-picker">
        <div class="lang-sel">
          <select id="srcLang">
            <option value="auto">🔍 Deteksi Otomatis</option>
            <option value="id">🇮🇩 Indonesia</option>
            <option value="en">🇺🇸 Inggris</option>
            <option value="ja">🇯🇵 Jepang</option>
            <option value="ko">🇰🇷 Korea</option>
            <option value="zh">🇨🇳 Mandarin</option>
            <option value="ar">🇸🇦 Arab</option>
            <option value="fr">🇫🇷 Prancis</option>
            <option value="de">🇩🇪 Jerman</option>
            <option value="es">🇪🇸 Spanyol</option>
          </select>
          <svg class="sel-caret" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <polyline points="6 9 12 15 18 9"/>
          </svg>
        </div>
        <button class="swap-btn" id="swapBtn" title="Tukar bahasa">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="17 1 21 5 17 9"/>
            <path d="M3 11V9a4 4 0 0 1 4-4h14"/>
            <polyline points="7 23 3 19 7 15"/>
            <path d="M21 13v2a4 4 0 0 1-4 4H3"/>
          </svg>
        </button>
        <div class="lang-sel">
          <select id="tgtLang">
            <option value="id">🇮🇩 Indonesia</option>
            <option value="en" selected>🇺🇸 Inggris</option>
            <option value="ja">🇯🇵 Jepang</option>
            <option value="ko">🇰🇷 Korea</option>
            <option value="zh">🇨🇳 Mandarin</option>
            <option value="ar">🇸🇦 Arab</option>
            <option value="fr">🇫🇷 Prancis</option>
            <option value="de">🇩🇪 Jerman</option>
            <option value="es">🇪🇸 Spanyol</option>
          </select>
          <svg class="sel-caret" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <polyline points="6 9 12 15 18 9"/>
          </svg>
        </div>
      </div>

      <!-- Source Panel -->
      <div class="ta-wrap">
        <textarea class="ta" id="srcTxt" placeholder="Masukkan teks" maxlength="5000"></textarea>
        <button class="clear-btn" id="clearBtn" title="Hapus">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
        <div class="panel-foot">
          <span class="char-cnt" id="charCnt"></span>
        </div>
      </div>

      <div class="ta-divider"></div>

      <!-- Output Panel -->
      <div class="ta-wrap">
        <textarea class="ta ta-out" id="outTxt" placeholder="" readonly></textarea>
        <div class="skel" id="skelWrap">
          <div class="sk" style="width:82%"></div>
          <div class="sk" style="width:62%"></div>
          <div class="sk" style="width:74%"></div>
        </div>
        <div class="typing-dot" id="typingDot">
          <span></span><span></span><span></span>
        </div>
        <div class="romaji" id="romajiBox"></div>
        <div class="panel-foot">
          <button class="foot-btn" id="copyBtn">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="9" y="9" width="13" height="13" rx="2"/>
              <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
            </svg>
            Salin
          </button>
          <button class="foot-btn" id="shareBtn">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/>
              <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/>
              <line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/>
            </svg>
            Bagikan
          </button>
        </div>
      </div>

      <!-- Action Bar -->
      <div class="action-bar">
        <button class="btn-tr" id="trBtn">
          <svg class="tr-ico" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/>
            <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
          </svg>
          <div class="spin"></div>
          Terjemahkan
        </button>
        <label class="auto-wrap">
          <div class="ios-toggle on" id="autoTgl"></div>
          Auto
        </label>
        <button class="hist-btn" id="histBtn">Riwayat</button>
      </div>

    </div>

    <!-- History Card -->
    <div class="hist-card" id="histCard">
      <div class="hist-head">
        <span class="hist-title">Riwayat</span>
        <button class="hist-clr" id="clrHistBtn">Hapus semua</button>
      </div>
      <div class="hist-list" id="histList">
        <div class="hist-empty" id="histEmpty">Belum ada riwayat</div>
      </div>
    </div>
  </div>

  <!-- ===== TAB: OCR ===== -->
  <div id="pageOcr" class="hidden">
    <div class="ocr-card">

      <!-- Upload Zone (label = bisa diklik di iOS/Android) -->
      <label class="upload-zone" id="dropZone" for="imgInput">
        <input type="file" id="imgInput" accept="image/jpeg,image/png,image/webp"
          style="position:absolute;inset:0;opacity:0;width:100%;height:100%;cursor:pointer;"/>
        <div class="upload-icon">📷</div>
        <h3>Ketuk untuk Upload Gambar</h3>
        <p>Teks akan langsung diterjemahkan otomatis</p>
      </label>

      <div class="ocr-btns">
        <!-- Kamera — label langsung ke input (iOS/Android compatible) -->
        <label class="btn-cam" for="camInput">
          <input type="file" accept="image/*" capture="environment" id="camInput"
            style="position:fixed;top:-9999px;left:-9999px;opacity:0;"/>
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
            <circle cx="12" cy="13" r="4"/>
          </svg>
          Kamera
        </label>

        <!-- Galeri -->
        <label class="btn-cam" for="galInput">
          <input type="file" accept="image/jpeg,image/png,image/webp" id="galInput"
            style="position:fixed;top:-9999px;left:-9999px;opacity:0;"/>
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="3" width="18" height="18" rx="2"/>
            <circle cx="8.5" cy="8.5" r="1.5"/>
            <polyline points="21 15 16 10 5 21"/>
          </svg>
          Galeri
        </label>

        <div class="ocr-lang-wrap">
          Bahasa:
          <div class="ocr-sel-wrap">
            <select class="ocr-sel" id="ocrLang">
              <option value="auto" selected>🔍 Otomatis</option>
              <option value="eng">🇺🇸 Inggris</option>
              <option value="jpn">🇯🇵 Jepang</option>
              <option value="ind">🇮🇩 Indonesia</option>
              <option value="kor">🇰🇷 Korea</option>
              <option value="chi_sim">🇨🇳 Mandarin</option>
            </select>
            <svg class="ocr-sel-caret" width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <polyline points="6 9 12 15 18 9"/>
            </svg>
          </div>
        </div>
      </div>

      <!-- Preview -->
      <div class="prev-wrap" id="ocrPrev">
        <img id="ocrImg" src="" alt="Preview gambar"/>
        <div class="prev-actions">
          <button class="btn-rm" id="removeImg">Hapus Gambar</button>
        </div>
      </div>

      <!-- OCR Progress -->
      <div class="prog-wrap" id="ocrProg">
        <div class="prog-bar">
          <div class="prog-fill" id="progFill"></div>
        </div>
        <div class="prog-lbl" id="progLbl">Memuat...</div>
      </div>

    </div>
  </div>

</main>

<!-- ===================== CAMERA MODAL ===================== -->
<div class="overlay" id="camModal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-head">
      <span class="modal-title">Ambil Foto</span>
      <button class="modal-close" id="closeCam">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>
    <div class="modal-body">
      <video class="cam-video" id="camVid" autoplay playsinline muted></video>
      <canvas id="camCanvas" class="hidden"></canvas>
    </div>
    <div class="modal-foot">
      <button class="btn-cancel" id="camCancel">Batal</button>
      <button class="btn-cap" id="capBtn">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <circle cx="12" cy="12" r="3"/>
          <path d="M20 7h-3.5L14 4H10L7.5 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2z"/>
        </svg>
        Foto
      </button>
    </div>
  </div>
</div>

<!-- ===================== CONFIG MODAL ===================== -->
<div class="overlay" id="cfgModal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-head">
      <span class="modal-title">Pengaturan API</span>
      <button class="modal-close" id="closeCfg">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>
    <div class="modal-body">
      <div class="fg">
        <label class="fl">Provider</label>
        <select class="fi" id="providerSel" style="cursor:pointer;appearance:none;-webkit-appearance:none">
          <option value="google">Google AI Studio (Gratis)</option>
          <option value="openrouter">OpenRouter</option>
        </select>
        <div class="fn" id="providerNote"></div>
      </div>
      <div class="fg">
        <label class="fl">API Key</label>
        <input class="fi" type="password" id="keyInp"
          autocomplete="off" autocorrect="off" spellcheck="false"
          placeholder="Paste API key di sini..."/>
      </div>
      <div class="fg">
        <label class="fl">Model</label>
        <input class="fi" type="text" id="modelInp"
          autocomplete="off" autocorrect="off" spellcheck="false"/>
        <div class="fn" id="modelNote"></div>
      </div>
      <div class="sec-note">⚠️ API key tersimpan di browser lokal Anda saja.</div>
      <button class="btn-reset" id="resetBtn">Hapus Semua Data</button>
    </div>
    <div class="modal-foot">
      <button class="btn-cancel" id="cfgCancel">Batal</button>
      <button class="btn-save" id="saveBtn">Simpan</button>
    </div>
  </div>
</div>

<!-- Toast Container -->
<div class="toasts" id="toasts"></div>

<!-- ===================== SCRIPTS ===================== -->
<!-- Load order: translate → ocr → ui (ui calls init last) -->
<script src="translate.js"></script>
<script src="ocr.js"></script>
<script src="ui.js"></script>

</body>
</html>
